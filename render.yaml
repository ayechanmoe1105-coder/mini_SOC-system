services:
  - type: web
    name: soc-dashboard
    runtime: python
    buildCommand: pip install -r requirements_render.txt
    startCommand: gunicorn render_start:app --bind 0.0.0.0:$PORT --timeout 120 --workers 1 --threads 4
    envVars:
      - key: ENABLE_SYNTHETIC_LOG_GENERATOR
        value: "true"
      - key: SYNTHETIC_LOG_INTERVAL_SECONDS
        value: "15"
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.11.0"
